<!DOCTYPE html>
<html lang="en">
<head>
  <title>Off Screen | Login</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

 <nav class="navbar">
    <div class="logo">LOGO</div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Explore Hobbies</a></li>
      <li><a href="#">Resources</a></li>
      <li><a href="#">Community</a></li>
      <li><a href="#">About</a></li>
    </ul>

    <a href="login.html" class="signin">Sign In</a>
  </nav>

 
  <section class="auth-container">

    <h1>Off Screen</h1>
    <p class="subtitle">Make your time away from screens more meaningful.</p>

    <div class="auth-box">
   <div class="tabs">
  <button type="button" id="loginTab" class="active">Log In</button>
  <button type="button" id="signupTab">Sign Up</button>
</div>

      <!-- LOGIN -->
      <form id="loginForm" class="form active-form">
  <label>Email</label>
  <input type="email" id="loginEmail" required />

  <label>Password</label>
  <input type="password" id="loginPassword" required />

  <button type="submit">Sign In</button>

  <p class="divider">Or continue with</p>

  <button type="button" class="social-btn">Continue with Google</button>
  <button type="button" class="social-btn">Continue with Apple</button>

  <p class="switch">
    New here?
    <span id="goSignup">Create account</span>
  </p>
</form>
      

      <!-- SIGN UP -->
      <form id="signupForm" class="form">
  <label>Name</label>
  <input type="text" id="signupName" required />

  <label>Email</label>
  <input type="email" id="signupEmail" required />

  <label>Password</label>
  <input type="password" id="signupPassword" required />

  <button type="submit">Sign Up</button>


  <p class="divider">Or continue with</p>

  <button type="button" class="social-btn">Continue with Google</button>
  <button type="button" class="social-btn">Continue with Apple</button>

  <p class="switch">
    Already have an account?
    <span id="goLogin">Log in</span>
  </p>
</form>

      <div id="message"></div>

    </div>
  </section>

  <script src="auth.js"></script>
</body>
</html>
